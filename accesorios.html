<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salo Teje Arte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andada+Pro:ital,wght@0,400..840;1,400..840&family=Caprasimo&display=swap" rel="stylesheet">  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#e8541a">  
  
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
    <div class="header-inner">
      <a href="#" class="logo">
        <div class="logo">
       
                <img src="images/logo.png" alt="Logo" class="logo-img">
          </svg>
        </div>
      <span class="logo-name">Salo Teje Arte</span>
    </a>

    <nav id="main-nav">
      <a href="index.html">Inicio</a>
      <a href="prendas.html">Prendas</a>
      <a href="accesorios.html" class="active">Accesorios</a>
      <a href="amigurumis.html">Amigurumis</a>
      <a href="contacto.html">Contacto</a>
    </nav>

    <button class="btn-cart" id="cartBtn" title="Ver carrito" aria-label="Ver carrito">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
      </svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>

    <button class="hamburger" id="menuBtn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
<div class="breadcrumb">
      <a href="salo-teje-arte.html">Inicio</a>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      <span>Accesorios</span>
    </div>

<!-- ─── HERO ─── -->
<div class="page-hero">
  <h1>Accesorios</h1>
  <p>Complementos únicos para cada ocasión</p>
</div>

<!-- ─── PRODUCTS ─── -->
<main class="section">
  <div class="section-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    ¡En Descuento!
  </div>

  <div class="products-grid" id="productsGrid">
    <!-- Cards generated by JS -->
  </div>
</main>

<!-- ─── DIVIDER ─── -->
<div class="section-divider"><span>✨ Todos los Accesorios</span></div>

<!-- ─── ALL PRODUCTS ─── -->
<section class="all-section">
  <div class="all-section-header">
    <div class="all-section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Explorar colección completa
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-cat="all">Todos</button>
      <button class="filter-tab" data-cat="bolsos">Bolsos</button>
      <button class="filter-tab" data-cat="joyeria">Joyería</button>
      <button class="filter-tab" data-cat="cabello">Cabello</button>
      <button class="filter-tab" data-cat="otros">Otros</button>
    </div>
  </div>
  <div class="all-products-grid" id="allGrid"></div>
</section>
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer" role="dialog" aria-label="Carrito de compras">
  <div class="drawer-header">
    <h3>🛒 Tu Carrito</h3>
    <button class="btn-close" id="closeCart" aria-label="Cerrar carrito">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems">
    <div class="cart-empty">
      <span>🛍️</span>
      Aún no hay productos en el carrito
    </div>
  </div>
  <div class="drawer-footer" id="drawerFooter" style="display:none;">
    <div class="drawer-total">
      <span>Total</span>
      <span class="total-val" id="drawerTotal">$0</span>
    </div>
    <button class="btn-checkout">Ir a pagar →</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Products data ──

  const fmt = n => '$' + n.toLocaleString('es-CO');

  // ── DISCOUNT products ──
  const products = [
    { id:1, name:'Bolso Tejido Grande',  emoji:'👜', price:46750, old:55000, discount:15, cat:'bolsos' },
    { id:2, name:'Diadema Decorada',     emoji:'👑', price:14400, old:18000, discount:20, cat:'cabello' },
    { id:3, name:'Llavero Artesanal',    emoji:'🔑', price:10800, old:12000, discount:10, cat:'otros' },
    { id:4, name:'Aretes Tejidos',       emoji:'💎', price:10500, old:15000, discount:30, cat:'joyeria' },
    { id:5, name:'Anillo Tejido',        emoji:'💍', price:8500,  old:10000, discount:15, cat:'joyeria' },
    { id:6, name:'Pulsera Macramé',      emoji:'📿', price:12000, old:15000, discount:20, cat:'joyeria' },
    { id:7, name:'Bolso Mini Cruzado',   emoji:'👛', price:38000, old:45000, discount:16, cat:'bolsos' },
    { id:8, name:'Cintillo Tejido',      emoji:'🎀', price:9500,  old:11000, discount:14, cat:'cabello' },
  ];

  // ── ALL products (discount + extras sin descuento) ──
  const allProducts = [
    ...products,
    { id:9,  name:'Mochila Wayuu',        emoji:'🎒', price:65000, old:null, discount:0, cat:'bolsos' },
    { id:10, name:'Collar Macramé',        emoji:'📿', price:18000, old:null, discount:0, cat:'joyeria' },
    { id:11, name:'Vincha con Flores',     emoji:'🌸', price:14000, old:null, discount:0, cat:'cabello' },
    { id:12, name:'Cartera Tejida',        emoji:'👝', price:42000, old:null, discount:0, cat:'bolsos' },
    { id:13, name:'Tobillera Colorida',    emoji:'🪡', price:7500,  old:null, discount:0, cat:'joyeria' },
    { id:14, name:'Bolso de Playa',        emoji:'🏖️', price:55000, old:null, discount:0, cat:'bolsos' },
    { id:15, name:'Diadema con Pompones',  emoji:'🎀', price:11000, old:null, discount:0, cat:'cabello' },
    { id:16, name:'Llavero Amigurumi',     emoji:'🐻', price:13000, old:null, discount:0, cat:'otros' },
    { id:17, name:'Porta Gafas Tejido',    emoji:'👓', price:16000, old:null, discount:0, cat:'otros' },
    { id:18, name:'Pulsera Dúo',           emoji:'💛', price:9000,  old:null, discount:0, cat:'joyeria' },
    { id:19, name:'Clutch Elegante',       emoji:'💼', price:48000, old:null, discount:0, cat:'bolsos' },
    { id:20, name:'Cintillo Perlas',       emoji:'🤍', price:12500, old:null, discount:0, cat:'cabello' },
  ];

  function makeCard(p, showOld = true) {
    const hasDiscount = p.discount > 0 && p.old;
    const card = document.createElement('div');
    card.className = 'product-card' + (hasDiscount ? '' : ' no-discount');
    card.dataset.cat = p.cat;
    card.innerHTML = `
      <div class="badge">-${p.discount}%</div>
      <div class="card-thumb">${p.emoji}</div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-prices">
          <span class="price-new">${fmt(p.price)}</span>
          ${hasDiscount && showOld ? `<span class="price-old">${fmt(p.old)}</span>` : ''}
        </div>
        <button class="btn-add" data-id="${p.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
          Agregar al carrito
        </button>
      </div>`;
    return card;
  }

  // ── Render discount grid ──
  const grid = document.getElementById('productsGrid');
  products.forEach(p => grid.appendChild(makeCard(p, true)));

  // ── Render all products grid ──
  const allGrid = document.getElementById('allGrid');
  let currentFilter = 'all';

  function renderAllGrid(filter) {
    allGrid.innerHTML = '';
    const list = filter === 'all' ? allProducts : allProducts.filter(p => p.cat === filter);
    list.forEach(p => allGrid.appendChild(makeCard(p, true)));
  }
  renderAllGrid('all');

  // ── Filter tabs ──
  document.getElementById('filterTabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.cat;
    renderAllGrid(currentFilter);
  });

  // ── Cart state ──
  let cart = {};

  const badge       = document.getElementById('cartBadge');
  const drawerItems = document.getElementById('drawerItems');
  const drawerFooter= document.getElementById('drawerFooter');
  const drawerTotal = document.getElementById('drawerTotal');
  const toast       = document.getElementById('toast');

  function totalItems() { return Object.values(cart).reduce((s,i)=>s+i.qty,0); }
  function totalPrice() { return Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0); }

  function updateBadge() {
    const n = totalItems();
    badge.textContent = n;
    badge.classList.toggle('show', n > 0);
  }

  function renderDrawer() {
    const items = Object.values(cart);
    if (!items.length) {
      drawerItems.innerHTML = `<div class="cart-empty"><span>🛍️</span>Aún no hay productos en el carrito</div>`;
      drawerFooter.style.display = 'none';
      return;
    }
    drawerFooter.style.display = 'block';
    drawerTotal.textContent = fmt(totalPrice());
    drawerItems.innerHTML = items.map(i => `
      <div class="cart-item" data-id="${i.id}">
        <span class="ci-emoji">${i.emoji}</span>
        <div class="ci-info">
          <div class="ci-name">${i.name}</div>
          <div class="ci-price">${fmt(i.price)}</div>
        </div>
        <div class="ci-qty">
          <button onclick="changeQty(${i.id},-1)">−</button>
          <span>${i.qty}</span>
          <button onclick="changeQty(${i.id},+1)">+</button>
        </div>
      </div>`).join('');
  }

  function changeQty(id, delta) {
    if (!cart[id]) return;
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
    updateBadge();
    renderDrawer();
  }

  function addToCart(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    if (cart[id]) cart[id].qty++;
    else cart[id] = { ...p, qty: 1 };
    updateBadge();
    renderDrawer();
    showToast(`✔ ${p.name} agregado`);
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ── Event delegation – cubre AMBOS grids ──
  document.addEventListener('click', e => {
    const btn = e.target.closest('.btn-add');
    if (btn) addToCart(Number(btn.dataset.id));
  });

  // ── Cart drawer toggle ──
  const overlay = document.getElementById('cartOverlay');
  const drawer  = document.getElementById('cartDrawer');
  const cartBtn = document.getElementById('cartBtn');
  const closeBtn = document.getElementById('closeCart');

  function openCart()  { drawer.classList.add('open');  overlay.classList.add('open');  }
  function closeCart() { drawer.classList.remove('open'); overlay.classList.remove('open'); }

  cartBtn.addEventListener('click', openCart);
  closeBtn.addEventListener('click', closeCart);
  overlay.addEventListener('click', closeCart);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCart(); });

  // ── Mobile menu ──
  const menuBtn = document.getElementById('menuBtn');
  const nav     = document.getElementById('main-nav');
  menuBtn.addEventListener('click', () => nav.classList.toggle('open'));
</script>
</body>
</html>
